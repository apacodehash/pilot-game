document.addEventListener('keydown',function(e){
  K[e.keyCode]=true;initAudio();

  if(st==='pvpjoin'){
    if(e.keyCode===8){pvpInputCode=pvpInputCode.slice(0,-1);e.preventDefault();}

var tBtns={}; // active touch buttons {fire,missile,bomb,laser,spread,emp,boost,pause}
var tBtnDefs=[]; // populated in draw based on plane attacks

function tPos(touch){var r=cv.getBoundingClientRect();return{x:(touch.clientX-r.left)*(W/r.width),y:(touch.clientY-r.top)*(H/r.height)};}

cv.addEventListener('touchstart',function(e){
  e.preventDefault();initAudio();
  var r=cv.getBoundingClientRect();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i],p=tPos(t);
    // Menu clicks
    if(st!=='play'){mX=p.x;mY=p.y;mC=true;continue;}
    // Left side = joystick
    if(p.x<W*0.45&&!tJoy.active){
      tJoy.active=true;tJoy.id=t.identifier;tJoy.sx=p.x;tJoy.sy=p.y;tJoy.cx=p.x;tJoy.cy=p.y;tJoy.dx=0;tJoy.dy=0;
      continue;
    }
    // Right side = check buttons
    for(var b=0;b<tBtnDefs.length;b++){
      var bd=tBtnDefs[b],dx=p.x-bd.x,dy=p.y-bd.y;
      if(dx*dx+dy*dy<bd.r*bd.r){tBtns[bd.key]={id:t.identifier};break;}
    }
  }
},false);

cv.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i],p=tPos(t);
    if(tJoy.active&&t.identifier===tJoy.id){
      tJoy.cx=p.x;tJoy.cy=p.y;
      var maxR=50;
      tJoy.dx=Math.max(-maxR,Math.min(maxR,tJoy.cx-tJoy.sx));
      tJoy.dy=Math.max(-maxR,Math.min(maxR,tJoy.cy-tJoy.sy));
    }
  }
},false);

cv.addEventListener('touchend',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(tJoy.active&&t.identifier===tJoy.id){tJoy.active=false;tJoy.dx=0;tJoy.dy=0;}
    for(var key in tBtns){if(tBtns[key]&&tBtns[key].id===t.identifier)delete tBtns[key];}
  }
},false);

cv.addEventListener('touchcancel',function(e){
  tJoy.active=false;tJoy.dx=0;tJoy.dy=0;tBtns={};
},false);

var actx=null,sfxVol=0.3,musVol=0.15,bgmNodes=[],bgmTimer=null,bgmStep=0,bgmLv=0,engineNode=null,engineGain=null;
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
}
function playTone(freq,dur,type,vol,detune){
  if(!actx)return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  if(detune)o.detune.value=detune;
  g.gain.value=(vol||sfxVol)*0.5;
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+dur);
}
function playNoise(dur,vol){
  if(!actx)return;
  var buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  var s=actx.createBufferSource(),g=actx.createGain(),f=actx.createBiquadFilter();
  s.buffer=buf;f.type='lowpass';f.frequency.value=800;
  g.gain.value=(vol||sfxVol)*0.4;
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  s.connect(f);f.connect(g);g.connect(actx.destination);
  s.start();
}
function sfxShoot(){playTone(900,0.06,'square',0.2);playNoise(0.05,0.15);}
function sfxMissile(){playTone(600,0.15,'sawtooth',0.25);playTone(400,0.2,'sawtooth',0.15);}
function sfxBomb(){playTone(300,0.1,'square',0.15);playTone(200,0.15,'sawtooth',0.1);}
function sfxExplosion(big){playNoise(big?0.7:0.3,big?0.55:0.35);playTone(big?35:60,big?0.7:0.3,'sine',big?0.45:0.3);if(big){playTone(55,0.5,'sine',0.3);playTone(25,0.8,'sine',0.25);}}
function sfxHit(){playTone(200,0.08,'square',0.2);playTone(150,0.1,'sawtooth',0.15);}
function sfxPickup(){playTone(800,0.08,'sine',0.2);playTone(1200,0.1,'sine',0.2);}
function sfxBossWarn(){playTone(200,0.3,'square',0.25);playTone(150,0.4,'square',0.2);}
function sfxDeath(){playNoise(0.8,0.5);playTone(100,0.5,'sawtooth',0.35);playTone(60,0.8,'sine',0.3);}
function sfxLevelUp(){for(var i=0;i<4;i++)setTimeout(function(f){return function(){playTone(400+f*150,0.15,'sine',0.25);};}(i),i*100);}
function sfxLaser(){playTone(1200,0.08,'sawtooth',0.1);playTone(1500,0.06,'square',0.08);}
function sfxSpread(){playTone(700,0.06,'square',0.15);playTone(500,0.08,'square',0.1);playNoise(0.04,0.12);}
function sfxEMP(){playTone(150,0.4,'sine',0.3);playTone(300,0.3,'sine',0.2);playNoise(0.3,0.25);}
function sfxBoost(){playTone(400,0.15,'sawtooth',0.15);playTone(600,0.2,'sawtooth',0.12);}
function startEngine(){
  if(!actx||engineNode)return;
  engineNode=actx.createOscillator();engineGain=actx.createGain();
  var f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=200;
  engineNode.type='sawtooth';engineNode.frequency.value=55;
  engineGain.gain.value=0.04;
  engineNode.connect(f);f.connect(engineGain);engineGain.connect(actx.destination);
  engineNode.start();
}
function stopEngine(){if(engineNode){engineNode.stop();engineNode=null;engineGain=null;}}

function playBGMNote(freq,dur,type,vol){
  if(!actx)return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.value=vol;
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.linearRampToValueAtTime(vol*0.7,actx.currentTime+dur*0.5);
  g.gain.linearRampToValueAtTime(0.001,actx.currentTime+dur*0.95);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+dur);
  bgmNodes.push(o);
  setTimeout(function(){var idx=bgmNodes.indexOf(o);if(idx>=0)bgmNodes.splice(idx,1);},dur*1000+100);
}
function bgmTick(){
  if(!actx||st!=='play')return;
  var d=bgmData[bgmLv];if(!d)return;
  var mi=bgmStep%d.mel.length;
  var bi=bgmStep%d.bas.length;
  var dur=d.tempo/1000;
  // Melody note
  playBGMNote(d.mel[mi],dur*0.85,d.mType,musVol*0.18);
  // Bass note (every 2 steps)
  if(bgmStep%2===0)playBGMNote(d.bas[bi],dur*1.8,d.bType,musVol*0.22);
  // Percussion tick (every 4 steps for swing, every 2 for march)
  var percEvery=d.swing?1:2;
  if(bgmStep%percEvery===0){
    var pb=actx.createBuffer(1,Math.floor(actx.sampleRate*0.03),actx.sampleRate);
    var pd=pb.getChannelData(0);for(var i=0;i<pd.length;i++)pd[i]=(Math.random()*2-1)*0.5;
    var ps=actx.createBufferSource(),pg=actx.createGain(),pf=actx.createBiquadFilter();
    ps.buffer=pb;pf.type='highpass';pf.frequency.value=d.swing?3000:1500;
    pg.gain.value=musVol*(d.swing?0.08:0.06);
    ps.connect(pf);pf.connect(pg);pg.connect(actx.destination);ps.start();
  }
  bgmStep++;
}
function startBGM(level){
  stopBGM();
  if(!actx)return;
  bgmLv=level||lv;bgmStep=0;
  var d=bgmData[bgmLv];if(!d)return;
  bgmTimer=setInterval(bgmTick,d.tempo);
}
function stopBGM(){
  if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;}
  for(var i=0;i<bgmNodes.length;i++){try{bgmNodes[i].stop();}catch(e){}}
  bgmNodes=[];
}

function loadPeerJS(cb){
  if(pvpPeerLoaded||typeof Peer!=='undefined'){pvpPeerLoaded=true;cb();return;}
  var s=document.createElement('script');
  // Try local peerjs.min.js first
  s.src='peerjs.min.js';
  s.onload=function(){pvpPeerLoaded=true;cb();};
  s.onerror=function(){
    // Fallback to CDN
    var s2=document.createElement('script');
    s2.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    s2.onload=function(){pvpPeerLoaded=true;cb();};
    s2.onerror=function(){pvpError=lang===0?'Kunde inte ladda PeerJS':lang===2?'无法加载PeerJS':'Could not load PeerJS';pvpState='none';};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

// Generate a short room code
function genRoomCode(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code='';for(var i=0;i<4;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function pvpSend(msg){
  if(pvpConn&&pvpConn.open){
    try{pvpConn.send(msg);}catch(e){}
  }
}

function pvpSetupConn(conn){
  pvpConn=conn;
  conn.on('data',function(msg){pvpHandleMsg(msg);});
  conn.on('close',function(){
    if(pvpState==='fight'){pvpResult='disconnect';pvpState='result';stopEngine();stopBGM();}
    else if(pvpState!=='none'&&pvpState!=='result'){pvpError=t('pvpOpponentLeft');pvpState='none';}
    pvpConn=null;
  });
  conn.on('error',function(err){
    pvpError=err.message||'Connection error';
  });
}

function pvpHandleMsg(msg){
  if(!msg||!msg.type)return;
  switch(msg.type){
    case 'join':
      pvpOpponentPlane=msg.planeType||0;pvpState='planesel';
      pvpSend({type:'welcome',planeType:pvpMyPlane});
      break;
    case 'welcome':
      pvpOpponentPlane=msg.planeType||0;pvpState='planesel';break;
    case 'plane_select':
      pvpOpponentPlane=msg.planeType;break;
    case 'ready':
      pvpOpponentReady=true;
      // If both ready, host starts the game
      if(pvpMyReady&&pvpOpponentReady&&pvpIsHost){
        pvpSend({type:'start'});
        pvpStartFight();
      }
      break;
    case 'start':
      pvpStartFight();break;
    case 'state':
      pvpOpponent.x=msg.x;pvpOpponent.y=H-msg.y;
      pvpOpponent.vx=msg.vx;pvpOpponent.vy=-msg.vy;
      pvpOpponent.roll=msg.roll;pvpOpponent.hp=msg.hp;pvpOpponent.mh=msg.mh;
      pvpOpponent.dead=msg.dead;pvpOpponent.boosting=msg.boosting;
      break;
    case 'bullet':
      pvpBullets.push({x:msg.x,y:H-msg.y,vx:msg.vx,vy:-msg.vy,dm:msg.dm||1,kind:msg.kind||'bullet',l:200});
      break;
    case 'died':
      pvpResult='win';pvpState='result';stopEngine();stopBGM();break;
    case 'rematch':
      pvpRematchOpp=true;
      if(pvpRematchMe&&pvpRematchOpp){
        pvpSend({type:'restart'});pvpStartFight();
      }
      break;
    case 'restart':
      pvpStartFight();break;
  }
}

function pvpCreateRoom(){
  pvpState='connecting';pvpError='';
  loadPeerJS(function(){
    var code=genRoomCode();
    var peerId='sky1942-'+code;
    try{
      pvpPeer=new Peer(peerId);
    }catch(e){pvpError=e.message;pvpState='none';return;}
    pvpPeer.on('open',function(id){
      pvpRoom=code;pvpIsHost=true;pvpState='lobby';
    });
    pvpPeer.on('connection',function(conn){
      pvpSetupConn(conn);
    });
    pvpPeer.on('error',function(err){
      if(err.type==='unavailable-id'){
        pvpPeer.destroy();pvpPeer=null;
        pvpCreateRoom(); // retry with new code
      } else if(pvpState==='connecting'||pvpState==='lobby'){
        pvpError=lang===0?'Ingen internetanslutning':lang===2?'没有网络连接':'No internet connection';
        pvpState='none';
      }
    });
  });
}

function pvpJoinRoom(code){
  pvpState='connecting';pvpError='';
  loadPeerJS(function(){
    var peerId='sky1942-join-'+code+'-'+Math.random().toString(36).substr(2,4);
    try{
      pvpPeer=new Peer(peerId);
    }catch(e){pvpError=e.message;pvpState='none';return;}
    pvpPeer.on('open',function(){
      var targetId='sky1942-'+code.toUpperCase();
      var conn=pvpPeer.connect(targetId,{reliable:true});
      conn.on('open',function(){
        pvpRoom=code.toUpperCase();pvpIsHost=false;
        pvpSetupConn(conn);
        pvpSend({type:'join',planeType:pvpMyPlane});
      });
      conn.on('error',function(err){
        pvpError=err.message||'Could not connect to room';
        pvpState='none';
      });
      // Timeout if connection doesn't open
      setTimeout(function(){
        if(pvpState==='connecting'){pvpError=lang===0?'Rummet hittades inte':lang===2?'房间未找到':'Room not found';pvpState='none';}
      },8000);
    });
    pvpPeer.on('error',function(err){
      pvpError=err.message||'Connection error';
      if(pvpState==='connecting')pvpState='none';
    });
  });
}

function pvpStartFight(){
  pvpState='countdown';pvpCountdown=180;
  pvpResult='';pvpRematchMe=false;pvpRematchOpp=false;
  pvpBullets=[];pvpSendTimer=0;
  // Create player for PvP
  pvpOpponent={x:W/2,y:90,vx:0,vy:0,roll:0,hp:100,mh:100,dead:false,boosting:false};
  var pl=PLANES[pvpMyPlane],mhp=pl.hp;
  P={x:W/2,y:H-90,vx:0,vy:0,hp:mhp,mh:mhp,cd:0,mc:0,bc:0,am:9999,bm:5,iv:0,kl:0,roll:0,dead:false,
     laser:0,laserE:100,laserMax:100,sprd:0,emp:0,boost:0,boostE:100,boostMax:100,boosting:false,
     pt:pvpMyPlane,spd:pl.spd,fr:pl.firerate,dmgM:pl.dmg};
  P2=null;nPl=1;
  PB=[];EB=[];MS=[];BM=[];PT=[];TX=[];DR=[];FB=[];EN=[];BOSS=null;
  sc=0;cmb=0;cmbT=0;fls=0;shk=0;shkA=0;
  initAudio();startEngine();
}

function pvpDisconnect(){
  if(pvpConn){try{pvpConn.close();}catch(e){}pvpConn=null;}
  if(pvpPeer){try{pvpPeer.destroy();}catch(e){}pvpPeer=null;}
  pvpState='none';pvpRoom='';pvpInputCode='';pvpError='';
  pvpMyReady=false;pvpOpponentReady=false;
  pvpRematchMe=false;pvpRematchOpp=false;
  stopEngine();stopBGM();
}

// ============ PVP UPDATE (called from main update) ============
function pvpUpdate(){
  if(pvpState==='countdown'){
    pvpCountdown--;
    if(pvpCountdown<=0){pvpState='fight';startBGM(1);}
    return;
  }
  if(pvpState!=='fight')return;
  if(P.dead)return;

  // Player movement (same as normal)
  var mx=(K[39]?1:0)-(K[37]?1:0)+(K[68]?1:0)-(K[65]?1:0);
  var my=(K[40]?1:0)-(K[38]?1:0)+(K[83]?1:0)-(K[87]?1:0);
  if(tJoy.active){mx+=tJoy.dx/50;my+=tJoy.dy/50;}
  var ps=P.spd||1;
  P.vx+=mx*0.7*ps;P.vy+=my*0.7*ps;
  P.vx*=0.88;P.vy*=0.88;
  P.x+=P.vx;P.y+=P.vy;
  P.x=Math.max(25,Math.min(W-25,P.x));
  P.y=Math.max(30,Math.min(H-30,P.y));
  P.roll=P.vx;
  if(P.iv>0)P.iv--;

  // Shooting
  if(P.cd>0)P.cd--;
  var pfr=P.fr||1;
  if((K[32]||tBtns.fire)&&P.cd<=0){
    PB.push({x:P.x-8,y:P.y-25,vx:0,vy:-10,dm:P.dmgM||1});
    PB.push({x:P.x+8,y:P.y-25,vx:0,vy:-10,dm:P.dmgM||1});
    P.cd=Math.max(3,Math.round(7/pfr));sfxShoot();
    pvpSend({type:'bullet',x:P.x-8,y:P.y-25,vx:0,vy:-10,dm:P.dmgM||1,kind:'bullet'});
    pvpSend({type:'bullet',x:P.x+8,y:P.y-25,vx:0,vy:-10,dm:P.dmgM||1,kind:'bullet'});
  }

  // Special attacks
  var pa=PLANES[P.pt].atk;
  if(P.mc>0)P.mc--;
  if(pa.missile&&(K[77]||K[190]||tBtns.missile)&&P.mc<=0&&P.am>0){
    // Fire missiles toward opponent
    MS.push({x:P.x-12,y:P.y-15,vx:-1,vy:-6,sp:8,tg:null,a:-Math.PI/2,l:140,pvp:true});
    MS.push({x:P.x+12,y:P.y-15,vx:1,vy:-6,sp:8,tg:null,a:-Math.PI/2,l:140,pvp:true});
    P.mc=28;P.am--;sfxMissile();
    pvpSend({type:'bullet',x:P.x-12,y:P.y-15,vx:-1,vy:-8,dm:3,kind:'missile'});
    pvpSend({type:'bullet',x:P.x+12,y:P.y-15,vx:1,vy:-8,dm:3,kind:'missile'});
  }
  if(P.bc>0)P.bc--;
  if(pa.bomb&&(K[191]||tBtns.bomb)&&P.bc<=0&&P.bm>0){
    FB.push({x:P.x,y:P.y,vy:-3,t:0,mt:50});
    P.bc=40;P.bm--;sfxBomb();
    pvpSend({type:'bullet',x:P.x,y:P.y,vx:0,vy:-3,dm:8,kind:'bomb'});
  }
  if(pa.spread&&(K[86]||tBtns.spread)&&P.sprd<=0){
    for(var si=-3;si<=3;si++){
      var sa=si*0.15;
      PB.push({x:P.x,y:P.y-20,vx:Math.sin(sa)*6,vy:-10*Math.cos(sa),dm:(P.dmgM||1)*0.7});
      pvpSend({type:'bullet',x:P.x,y:P.y-20,vx:Math.sin(sa)*6,vy:-10*Math.cos(sa),dm:(P.dmgM||1)*0.7,kind:'spread'});
    }
    P.sprd=45;sfxSpread();
  }
  if(P.sprd>0)P.sprd--;
  if(pa.emp&&(K[78]||tBtns.emp)&&P.emp<=0){
    P.emp=600;sfxEMP();
    pvpSend({type:'bullet',x:P.x,y:P.y,vx:0,vy:0,dm:2,kind:'emp'});
  }
  if(P.emp>0)P.emp--;
  // Boost
  if(pa.boost){
    if((K[16]||tBtns.boost)&&P.boostE>0){
      P.boosting=true;P.boostE=Math.max(0,P.boostE-1.2);
      P.spd=PLANES[P.pt].spd*1.8;
    }else{P.boosting=false;P.spd=PLANES[P.pt].spd;if(P.boostE<P.boostMax)P.boostE+=0.3;}
  }
  // Laser
  if(pa.laser&&(K[76]||tBtns.laser)&&P.laserE>0){
    P.laser=1;P.laserE=Math.max(0,P.laserE-1.5);
    pvpSend({type:'bullet',x:P.x,y:P.y-30,vx:0,vy:0,dm:0.4,kind:'laser'});
  }else{P.laser=0;if(P.laserE<P.laserMax)P.laserE+=0.4;}

  // Move our bullets
  for(var i=PB.length-1;i>=0;i--){
    PB[i].x+=PB[i].vx;PB[i].y+=PB[i].vy;
    if(PB[i].y<-20||PB[i].y>H+20||PB[i].x<-20||PB[i].x>W+20)PB.splice(i,1);
  }

  // Move missiles
  for(var i=MS.length-1;i>=0;i--){
    var m=MS[i];
    // In PvP, guide toward opponent
    if(m.pvp&&!pvpOpponent.dead){
      var tdx=pvpOpponent.x-m.x,tdy=pvpOpponent.y-m.y;
      var ta=Math.atan2(tdy,tdx);
      var da=ta-m.a;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      m.a+=da*0.08;
    }
    m.vx=Math.cos(m.a)*m.sp;m.vy=Math.sin(m.a)*m.sp;
    m.x+=m.vx;m.y+=m.vy;m.l--;
    if(m.l<=0||m.x<-30||m.x>W+30||m.y<-30||m.y>H+30){MS.splice(i,1);continue;}
    // Hit opponent?
    if(!pvpOpponent.dead){
      var dx=m.x-pvpOpponent.x,dy=m.y-pvpOpponent.y;
      if(dx*dx+dy*dy<900){
        pvpSend({type:'bullet',x:m.x,y:m.y,vx:m.vx,vy:m.vy,dm:4,kind:'missile'});
        BM.push({x:m.x,y:m.y,p:0,b:false});aP(m.x,m.y,8,255,150,0,3,20);sfxExplosion(false);
        MS.splice(i,1);
      }
    }
  }

  // Falling bombs
  for(var i=FB.length-1;i>=0;i--){
    FB[i].y+=FB[i].vy;FB[i].t++;
    if(FB[i].t>=FB[i].mt){
      BM.push({x:FB[i].x,y:FB[i].y,p:0,b:true});
      aP(FB[i].x,FB[i].y,18,255,80,0,4,30);sfxExplosion(true);shk=10;shkA=8;
      // Check if bomb hits opponent
      if(!pvpOpponent.dead){
        var bdx=FB[i].x-pvpOpponent.x,bdy=FB[i].y-pvpOpponent.y;
        if(bdx*bdx+bdy*bdy<3600)pvpSend({type:'bullet',x:FB[i].x,y:FB[i].y,vx:0,vy:0,dm:8,kind:'bomb'});
      }
      FB.splice(i,1);
    }
  }

  // Check opponent's bullets hitting us
  for(var i=pvpBullets.length-1;i>=0;i--){
    var b=pvpBullets[i];
    b.x+=b.vx;b.y+=b.vy;b.l--;
    if(b.l<=0||b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){pvpBullets.splice(i,1);continue;}
    // Hit check (flip Y since opponent sees us mirrored)
    var dx=b.x-P.x,dy=b.y-P.y;
    if(!P.dead&&P.iv<=0&&dx*dx+dy*dy<625){
      var dmg=Math.round(b.dm*10);
      if(b.kind==='bomb')dmg=Math.round(b.dm*12);
      if(b.kind==='missile')dmg=Math.round(b.dm*8);
      if(b.kind==='emp')dmg=Math.round(b.dm*5);
      P.hp-=dmg;fls=8;shk=5;shkA=4;sfxHit();
      aP(P.x,P.y,5,255,100,100,2,15);
      pvpBullets.splice(i,1);
      if(P.hp<=0){
        P.hp=0;P.dead=true;
        BM.push({x:P.x,y:P.y,p:0,b:true});aP(P.x,P.y,20,255,100,0,4,35);sfxDeath();
        pvpSend({type:'died'});
        pvpResult='lose';pvpState='result';stopEngine();stopBGM();
      }
    }
  }

  // Laser hit check
  if(P.laser&&!pvpOpponent.dead){
    var ldx=Math.abs(P.x-pvpOpponent.x);
    if(ldx<20&&pvpOpponent.y<P.y){
      // Laser beam hits opponent
      aP(pvpOpponent.x,pvpOpponent.y+10,2,0,200,255,1.5,8);
    }
  }

  // Send our state periodically (every 2 frames)
  pvpSendTimer++;
  if(pvpSendTimer>=2){
    pvpSendTimer=0;
    pvpSend({type:'state',x:P.x,y:P.y,vx:P.vx,vy:P.vy,roll:P.roll,hp:P.hp,mh:P.mh,dead:P.dead,boosting:P.boosting});
  }

  // Update effects
  for(var i=BM.length-1;i>=0;i--){BM[i].p+=0.04;if(BM[i].p>=1)BM.splice(i,1);}
  for(var i=PT.length-1;i>=0;i--){PT[i].x+=PT[i].vx;PT[i].y+=PT[i].vy;PT[i].l--;if(PT[i].l<=0)PT.splice(i,1);}
  for(var i=TX.length-1;i>=0;i--){TX[i].y-=0.8;TX[i].l--;if(TX[i].l<=0)TX.splice(i,1);}
  if(shk>0){shk--;shkA*=0.9;}
  if(cmbT>0)cmbT--;
  if(fls>0)fls--;
  scrollY+=1.5;
}

function mkE(type,x,y){

    t:{h:70,sp:1,sr:100,c:'#5A5A5A',sc:250,sl:1.4},
    b:{h:40,sp:1.2,sr:40,c:'#7A5A3A',sc:200,sl:1.2}
  }[type];
  var dm=DIFF_M[diff];
  var hm=(1+(lv-1)*0.2)*dm[0],sm=(1+(lv-1)*0.06)*dm[1];
  return{
    x:x,y:y,vx:0,vy:cf.sp*sm,sp:cf.sp*sm,

function drawBoom(x,y,p,big){
  var mr=big?55:35,r=Math.max(mr*p,1),al=1-p;
  var g=cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba(255,255,220,'+al+')');
  g.addColorStop(0.3,'rgba(255,200,50,'+(al*0.8)+')');
  g.addColorStop(0.7,'rgba(255,80,0,'+(al*0.4)+')');
  g.addColorStop(1,'rgba(50,0,0,0)');
  cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  for(var i=0;i<(big?8:5);i++){
    var a2=(i/(big?8:5))*Math.PI*2+p*3,d2=r*(0.4+Math.random()*0.5);
    cx.fillStyle='rgba(255,'+(100+Math.floor(Math.random()*150))+',0,'+al+')';
    cx.beginPath();cx.arc(x+Math.cos(a2)*d2,y+Math.sin(a2)*d2,2.5*(1-p),0,Math.PI*2);cx.fill();
  }
}

function drawCrater(cr){
  var p=cr.age/cr.maxAge;
  var al=1-p;
  cx.save();

  if(cr.bomb){
    // MASSIVE BOMB EXPLOSION shockwave
    // Outer ring (red-orange, expands to full blast radius ~120px)
    cx.strokeStyle='rgba(255,60,0,'+(al*0.8)+')';
    cx.lineWidth=6*(1-p);
    cx.beginPath();cx.arc(cr.x,cr.y,10+p*130,0,Math.PI*2);cx.stroke();
    // Second ring (orange-yellow)
    cx.strokeStyle='rgba(255,180,30,'+(al*0.7)+')';
    cx.lineWidth=5*(1-p);
    cx.beginPath();cx.arc(cr.x,cr.y,8+p*100,0,Math.PI*2);cx.stroke();
    // Third ring (yellow-white)
    cx.strokeStyle='rgba(255,240,100,'+(al*0.6)+')';
    cx.lineWidth=4*(1-p);
    cx.beginPath();cx.arc(cr.x,cr.y,5+p*70,0,Math.PI*2);cx.stroke();
    // Inner white-hot ring
    if(p<0.5){
      cx.strokeStyle='rgba(255,255,255,'+(al*0.6)+')';
      cx.lineWidth=3*(1-p*2);
      cx.beginPath();cx.arc(cr.x,cr.y,3+p*45,0,Math.PI*2);cx.stroke();
    }
    // Fire center glow (big)
    if(p<0.35){
      var ga=0.6-p*1.7;
      cx.fillStyle='rgba(255,220,80,'+ga+')';
      cx.beginPath();cx.arc(cr.x,cr.y,35*(1-p*2.5),0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,255,200,'+(ga*0.6)+')';
      cx.beginPath();cx.arc(cr.x,cr.y,20*(1-p*2.5),0,Math.PI*2);cx.fill();
    }
  } else {
    // Water splash ring (original)
    cx.strokeStyle='rgba(255,255,255,'+(al*0.5)+')';
    cx.lineWidth=3*(1-p);
    cx.beginPath();cx.arc(cr.x,cr.y,10+p*60,0,Math.PI*2);cx.stroke();
    if(p>0.15){
      cx.strokeStyle='rgba(200,230,255,'+(al*0.3)+')';
      cx.lineWidth=2*(1-p);
      cx.beginPath();cx.arc(cr.x,cr.y,5+p*40,0,Math.PI*2);cx.stroke();
    }
    if(p<0.4){
      cx.fillStyle='rgba(0,50,100,'+(0.4-p)+')';
      cx.beginPath();cx.arc(cr.x,cr.y,15*(1-p*2),0,Math.PI*2);cx.fill();
    }
  }
  cx.restore();
}

// ============ BOSS SYSTEM ============
function mkBoss(level){
  var dm=DIFF_M[diff];
  var hp=Math.round((200+level*150)*dm[3]);
  var sp=(0.5+level*0.08)*dm[1];
  var names=['ZERO ACE','RAIDEN','SHINDEN','KIKKA','HAYATE','SHINZAN','FUGAKU','YAMATO'];
  var sizes=[1.4,1.6,1.8,2.0,2.2,2.5,2.8,3.2]; // much bigger size progression
  return{
    x:W/2, y:-80, vy:0.6, vx:0, sp:sp,
    hp:hp, mh:hp,
    phase:0,
    cd:0, cd2:0, cd3:0,
    mt:0, ht:0,
    lv:level,
    name:names[Math.min(level-1,7)],
    sz:sizes[Math.min(level-1,7)],
    pat:0, patT:0,
    dead:false
  };
}

function drawHP(x,y,h,m,w){
  var r=h/m;
  cx.fillStyle='#333';cx.fillRect(x-w/2,y,w,4);
  cx.fillStyle=r>0.5?'#4CAF50':r>0.25?'#FF9800':'#F44336';
  cx.fillRect(x-w/2,y,w*r,4);
}

function drawBtn(x,y,w,h,text){
  var fs=h<=32?Math.max(12,Math.round(h*0.5)):20;
  cx.fillStyle='#D32F2F';cx.fillRect(x-w/2,y-h/2,w,h);
  cx.strokeStyle='#FFD700';cx.lineWidth=h<=32?2:3;cx.strokeRect(x-w/2,y-h/2,w,h);
  cx.fillStyle='#fff';cx.font='bold '+fs+'px Arial';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(text,x,y);
  if(mC&&mX>x-w/2&&mX<x+w/2&&mY>y-h/2&&mY<y+h/2) return true;
  return false;
}

// ============ GAME LOGIC ============

function killEnemy(i){
  var e=EN[i],pts=Math.round(e.sc*(1+cmb*0.15));
  sc+=pts;cmb++;cmbT=100;
  if(P&&!P.dead)P.kl++;else if(P2&&!P2.dead)P2.kl++;
  BM.push({x:e.x,y:e.y,p:0,b:e.t==='t'});
  aP(e.x,e.y,14,255,150,0,3.5,28);
  aP(e.x,e.y,6,255,30,0,2.5,32);
  shk=8;shkA=e.t==='t'?7:4;sfxExplosion(e.t==='t');
  var txt=cmb>=5?t('mega')+' x'+cmb+'!':cmb>=3?t('comboTxt')+' x'+cmb+'!':'+'+pts;
  aT(e.x,e.y-20,txt,cmb>=3?'#FFD700':'#fff');
  var rr=Math.random();
  if(rr<0.18)DR.push({x:e.x,y:e.y,tp:'hp',vy:1,l:200});
  else if(rr<0.3)DR.push({x:e.x,y:e.y,tp:'m',vy:1,l:200});
  else if(rr<0.37)DR.push({x:e.x,y:e.y,tp:'b',vy:1,l:200});
  EN.splice(i,1);
}

function startGame(){
  sc=0;lv=1;cmb=0;cmbT=0;P=mkP();

function killPlayer(pl){
  pl.dead=true;
  BM.push({x:pl.x,y:pl.y,p:0,b:true});aP(pl.x,pl.y,20,255,100,0,4,35);
  sfxDeath();
  // Check if all players dead
  var allDead=P.dead&&(!P2||P2.dead);
  if(allDead){st='over';stopEngine();stopBGM();}
}
function doGameOver(){st='over';}

// ============ UPDATE ============
function update(){
  scrollY+=1.5; // Background scroll

  // PvP mode update
  if(pvpState==='countdown'||pvpState==='fight'){pvpUpdate();return;}
  if(pvpState!=='none')return; // other pvp states don't need game update

  // PAUSE (P=80 or Escape=27)
  if(st==='pause'){return;}

  // Level transition
  if(st==='lvl'){lvlT--;if(lvlT<=0)st='play';return;}
  if(st!=='play') return;

  if(cmbT>0)cmbT--;else cmb=0;
  if(fls>0)fls--;

  // ===== PLAYER 1: Arrows + Space/M/B + Touch =====
  if(!P.dead){
    var mx=(K[39]?1:0)-(K[37]?1:0);
    var my=(K[40]?1:0)-(K[38]?1:0);
    // In 1-player mode, also allow WASD
    if(nPl===1){mx+=(K[68]?1:0)-(K[65]?1:0);my+=(K[83]?1:0)-(K[87]?1:0);}
    // Touch joystick input
    if(tJoy.active){mx+=tJoy.dx/50;my+=tJoy.dy/50;}
    var ps=P.spd||1;
    P.vx+=mx*0.7*ps;P.vy+=my*0.7*ps;
    P.vx*=0.88;P.vy*=0.88;
    P.x+=P.vx;P.y+=P.vy;
    P.x=Math.max(25,Math.min(W-25,P.x));
    P.y=Math.max(30,Math.min(H-30,P.y));
    P.roll=P.vx;
    if(P.iv>0)P.iv--;

    // SHOOT (space=32 or touch fire)
    if(P.cd>0)P.cd--;
    var pfr=P.fr||1;
    if((K[32]||tBtns.fire)&&P.cd<=0){
      PB.push({x:P.x-8,y:P.y-25,vx:0,vy:-10,dm:P.dmgM||1});
      PB.push({x:P.x+8,y:P.y-25,vx:0,vy:-10,dm:P.dmgM||1});
      aP(P.x-8,P.y-28,1,255,255,100,1,4);
      aP(P.x+8,P.y-28,1,255,255,100,1,4);
      P.cd=Math.max(3,Math.round(7/pfr));sfxShoot();
    }
    // MISSILE (m=77 for 1P, .=190 in 2P)
    var p1a=PLANES[P.pt].atk;
    if(P.mc>0)P.mc--;
    var p1mKey=nPl===2?190:77;
    if(p1a.missile&&(K[p1mKey]||tBtns.missile)&&P.mc<=0&&P.am>0){
      var tg=null,md=999999;
      for(var i=0;i<EN.length;i++){var dd=Math.abs(EN[i].x-P.x)+Math.abs(EN[i].y-P.y);if(dd<md){md=dd;tg=EN[i];}}
      MS.push({x:P.x-12,y:P.y-15,vx:-1,vy:-6,sp:8,tg:tg,a:-Math.PI/2,l:140});
      MS.push({x:P.x+12,y:P.y-15,vx:1,vy:-6,sp:8,tg:tg,a:-Math.PI/2,l:140});
      P.mc=28;aT(P.x,P.y-35,t('missile'),'#FF6D00');K[p1mKey]=false;sfxMissile();
    }
    // BOMB (b=66 for 1P, /=191 in 2P)
    if(P.bc>0)P.bc--;
    var p1bKey=nPl===2?191:66;
    if(p1a.bomb&&(K[p1bKey]||tBtns.bomb)&&P.bc<=0&&P.bm>0){
      BOMBS.push({x:P.x,y:P.y-10,vx:0,vy:-6,sz:1,age:0,maxAge:45});
      P.bm--;P.bc=35;K[p1bKey]=false;
      aT(P.x,P.y-30,t('bomb'),'#FF1744');sfxBomb();
    }
    // LASER (L=76 in 1P, ,=188 in 2P) - hold to fire, drains energy
    var p1lKey=nPl===2?188:76;
    if(p1a.laser&&(K[p1lKey]||tBtns.laser)&&P.laserE>2){
      P.laser=1;P.laserE-=((P.pt===3)?0.8:1.5);
      if(P.cd<=0){sfxLaser();P.cd=4;}
    } else {P.laser=0;if(p1a.laser)P.laserE=Math.min(P.laserMax,P.laserE+0.4);}
    // SPREAD SHOT (V=86 in 1P, ;=186 in 2P)
    if(P.sprd>0)P.sprd--;
    var p1sKey=nPl===2?186:86;
    if(p1a.spread&&(K[p1sKey]||tBtns.spread)&&P.sprd<=0){
      for(var si=-2;si<=2;si++){
        var sa=si*0.18;
        PB.push({x:P.x,y:P.y-20,vx:Math.sin(sa)*5,vy:-10*Math.cos(sa)});
      }
      P.sprd=18;sfxSpread();K[p1sKey]=false;
      aP(P.x,P.y-25,3,255,200,100,2,8);
    }
    // EMP PULSE (N=78 in 1P, ]=221 in 2P)
    if(P.emp>0)P.emp--;
    var p1eKey=nPl===2?221:78;
    if(p1a.emp&&(K[p1eKey]||tBtns.emp)&&P.emp<=0){
      EMPS.push({x:P.x,y:P.y,r:0,maxR:140,dmg:35,age:0});
      P.emp=180;sfxEMP();K[p1eKey]=false;
      aT(P.x,P.y-30,t('emp'),'#00E5FF');
      shk=6;shkA=4;
    }
    // SPEED BOOST (Shift=16)
    if(P.boost>0)P.boost--;
    if(p1a.boost&&(K[16]||tBtns.boost)&&!P.boosting&&P.boostE>=50){
      P.boosting=true;P.boost=(P.pt===1)?100:60;P.boostE-=((P.pt===1)?35:50);sfxBoost();
      aT(P.x,P.y-30,t('boost'),'#FFFF00');P.iv=60;
    }
    if(P.boosting){
      P.vx*=1.12;P.vy*=1.12;
      aP(P.x+(Math.random()-0.5)*10,P.y+15,1,255,200,0,2,6);
      if(P.boost<=0)P.boosting=false;
    }
    if(p1a.boost&&!P.boosting)P.boostE=Math.min(P.boostMax,P.boostE+0.3);
  }

  // ===== PLAYER 2: WASD + Q(missile)/E(bomb)/F(shoot) =====
  if(P2&&!P2.dead){
    var mx2=(K[68]?1:0)-(K[65]?1:0); // D/A
    var my2=(K[83]?1:0)-(K[87]?1:0); // S/W
    var p2s=P2.spd||1;
    P2.vx+=mx2*0.7*p2s;P2.vy+=my2*0.7*p2s;
    P2.vx*=0.88;P2.vy*=0.88;
    P2.x+=P2.vx;P2.y+=P2.vy;
    P2.x=Math.max(25,Math.min(W-25,P2.x));
    P2.y=Math.max(30,Math.min(H-30,P2.y));
    P2.roll=P2.vx;
    if(P2.iv>0)P2.iv--;

    // SHOOT (F=70)
    if(P2.cd>0)P2.cd--;
    var p2fr=P2.fr||1;
    if(K[70]&&P2.cd<=0){
      PB.push({x:P2.x-8,y:P2.y-25,vx:0,vy:-10,dm:P2.dmgM||1});
      PB.push({x:P2.x+8,y:P2.y-25,vx:0,vy:-10,dm:P2.dmgM||1});
      aP(P2.x-8,P2.y-28,1,100,200,255,1,4);
      aP(P2.x+8,P2.y-28,1,100,200,255,1,4);
      P2.cd=Math.max(3,Math.round(7/p2fr));sfxShoot();
    }
    // MISSILE (Q=81)
    var p2a=PLANES[P2.pt].atk;
    if(P2.mc>0)P2.mc--;
    if(p2a.missile&&K[81]&&P2.mc<=0&&P2.am>0){
      var tg2=null,md2=999999;
      for(var i=0;i<EN.length;i++){var dd=Math.abs(EN[i].x-P2.x)+Math.abs(EN[i].y-P2.y);if(dd<md2){md2=dd;tg2=EN[i];}}
      MS.push({x:P2.x-12,y:P2.y-15,vx:-1,vy:-6,sp:8,tg:tg2,a:-Math.PI/2,l:140});
      MS.push({x:P2.x+12,y:P2.y-15,vx:1,vy:-6,sp:8,tg:tg2,a:-Math.PI/2,l:140});
      P2.mc=28;aT(P2.x,P2.y-35,t('missile'),'#FF6D00');K[81]=false;sfxMissile();
    }
    // BOMB (E=69)
    if(P2.bc>0)P2.bc--;
    if(p2a.bomb&&K[69]&&P2.bc<=0&&P2.bm>0){
      BOMBS.push({x:P2.x,y:P2.y-10,vx:0,vy:-6,sz:1,age:0,maxAge:45});
      P2.bm--;P2.bc=35;K[69]=false;
      aT(P2.x,P2.y-30,t('bomb'),'#FF1744');sfxBomb();
    }
    // LASER (R=82) - hold to fire
    if(p2a.laser&&K[82]&&P2.laserE>2){
      P2.laser=1;P2.laserE-=((P2.pt===3)?0.8:1.5);
      if(P2.cd<=0){sfxLaser();P2.cd=4;}
    } else {P2.laser=0;if(p2a.laser)P2.laserE=Math.min(P2.laserMax,P2.laserE+0.4);}
    // SPREAD SHOT (T=84)
    if(P2.sprd>0)P2.sprd--;
    if(p2a.spread&&K[84]&&P2.sprd<=0){
      for(var si=-2;si<=2;si++){
        var sa=si*0.18;
        PB.push({x:P2.x,y:P2.y-20,vx:Math.sin(sa)*5,vy:-10*Math.cos(sa)});
      }
      P2.sprd=18;sfxSpread();K[84]=false;
      aP(P2.x,P2.y-25,3,100,200,255,2,8);
    }
    // EMP PULSE (C=67)
    if(P2.emp>0)P2.emp--;
    if(p2a.emp&&K[67]&&P2.emp<=0){
      EMPS.push({x:P2.x,y:P2.y,r:0,maxR:140,dmg:35,age:0});
      P2.emp=180;sfxEMP();K[67]=false;
      aT(P2.x,P2.y-30,t('emp'),'#00E5FF');
      shk=6;shkA=4;
    }
    // SPEED BOOST (Tab=9)
    if(P2.boost>0)P2.boost--;
    if(p2a.boost&&K[9]&&!P2.boosting&&P2.boostE>=50){
      P2.boosting=true;P2.boost=(P2.pt===1)?100:60;P2.boostE-=((P2.pt===1)?35:50);sfxBoost();
      aT(P2.x,P2.y-30,t('boost'),'#FFFF00');P2.iv=60;
    }
    if(P2.boosting){
      P2.vx*=1.12;P2.vy*=1.12;
      aP(P2.x+(Math.random()-0.5)*10,P2.y+15,1,100,200,255,2,6);
      if(P2.boost<=0)P2.boosting=false;
    }
    if(p2a.boost&&!P2.boosting)P2.boostE=Math.min(P2.boostMax,P2.boostE+0.3);
  }

  // Spawn
  spT++;
  if(spT>=lC.rt&&spN<lC.tot){
    // Spawn formations sometimes
    if(Math.random()<0.3&&spN+3<=lC.tot){
      // V-formation
      for(var i=0;i<3;i++){EN.push(mkE('a',W/2-40+i*40,-50-i*30));spN++;}
    } else {
      EN.push(mkE());spN++;
    }
    spT=0;
  }

  // Update enemies
  for(var i=0;i<EN.length;i++){
    var e=EN[i];e.mt+=0.03;if(e.ht>0)e.ht--;

    // Movement patterns
    if(e.t==='f'){
      e.vy=e.sp;e.vx=Math.sin(e.mt*4)*e.sp*2;
    } else if(e.t==='b'){
      e.vy=e.sp;
      var bt=P.dead&&P2&&!P2.dead?P2:P;
      var dx=bt.x-e.x;e.vx+=Math.sign(dx)*0.08;e.vx*=0.96;
    } else if(e.t==='t'){
      e.vy=e.sp*0.7;e.vx=Math.sin(e.mt*1.5)*0.5;
    } else {
      // Basic: various patterns
      if(e.pat===0){e.vy=e.sp;e.vx=Math.sin(e.mt*2)*1.5;}
      else if(e.pat===1){e.vy=e.sp;e.vx=0;}
      else{e.vy=e.sp*0.8;var dx2=P.x-e.x;e.vx+=Math.sign(dx2)*0.04;e.vx*=0.97;}
    }
    e.x+=e.vx;e.y+=e.vy;
    e.x=Math.max(15,Math.min(W-15,e.x));
    if(e.hp<e.mh*0.4&&Math.random()<0.2)aSm(e.x,e.y-10);

    // Shoot (target closest alive player)
    e.cd--;
    if(e.cd<=0&&e.y>20&&e.y<H-50){
      var tgt=P.dead&&P2&&!P2.dead?P2:P;
      if(P2&&!P2.dead&&!P.dead){var d1e=Math.abs(P.x-e.x)+Math.abs(P.y-e.y),d2e=Math.abs(P2.x-e.x)+Math.abs(P2.y-e.y);tgt=d2e<d1e?P2:P;}
      var dx=tgt.x-e.x,dy=tgt.y-e.y,di=Math.sqrt(dx*dx+dy*dy)||1;
      if(e.t==='b'){
        for(var j=-1;j<=1;j++){var aa=Math.atan2(dy,dx)+j*0.15;EB.push({x:e.x,y:e.y+15,vx:Math.cos(aa)*4.5,vy:Math.sin(aa)*4.5});}
      } else if(e.t==='t'){
        EB.push({x:e.x-10,y:e.y+15,vx:0,vy:5});EB.push({x:e.x+10,y:e.y+15,vx:0,vy:5});
        EB.push({x:e.x,y:e.y+15,vx:(dx/di)*4,vy:(dy/di)*4});
      } else {
        EB.push({x:e.x,y:e.y+15,vx:(dx/di)*5,vy:(dy/di)*5});
      }
      e.cd=e.sr*(0.8+Math.random()*0.4);
    }
  }

  // Missiles
  for(var i=MS.length-1;i>=0;i--){
    var m=MS[i];m.l--;
    if(m.l<=0){aP(m.x,m.y,4,255,100,0,2,8);MS.splice(i,1);continue;}
    if(m.tg&&EN.indexOf(m.tg)>=0){
      var dx=m.tg.x-m.x,dy=m.tg.y-m.y,wa=Math.atan2(dy,dx),ca=Math.atan2(m.vy,m.vx);
      var df=wa-ca;while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
      var tn=Math.min(Math.abs(df),0.09)*(df>0?1:-1);var na=ca+tn;
      m.vx=Math.cos(na)*m.sp;m.vy=Math.sin(na)*m.sp;
    }
    m.x+=m.vx;m.y+=m.vy;m.a=Math.atan2(m.vy,m.vx);
    aP(m.x,m.y+3,1,255,200,50,0.8,7);
    if(Math.random()<0.3)aSm(m.x,m.y+5);
    var mH=false;
    for(var j=EN.length-1;j>=0;j--){
      var e=EN[j],ddx=m.x-e.x,ddy=m.y-e.y;
      if(ddx*ddx+ddy*ddy<900){
        e.hp-=30;e.ht=6;aP(m.x,m.y,8,255,150,0,3.5,18);
        BM.push({x:m.x,y:m.y,p:0.2,b:false});sfxHit();
        aT(e.x,e.y-18,t('hit'),'#FF6D00');
        if(e.hp<=0)killEnemy(j);mH=true;break;
      }
    }
    if(mH||m.x<-20||m.x>W+20||m.y<-50||m.y>H+50){MS.splice(i,1);}
  }

  // UPDATE BOMBS - flies forward, explodes on contact OR after short time
  var BOMB_RADIUS=120; // big explosion radius
  var BOMB_DMG=60;
  for(var i=BOMBS.length-1;i>=0;i--){
    var bo=BOMBS[i];
    bo.age++;
    bo.x+=bo.vx;
    bo.y+=bo.vy;

    // Smoke trail
    if(bo.age%2===0)aSm(bo.x,bo.y+8);

    // Check direct hit on enemy (explode immediately)
    var explode=false;
    for(var j=EN.length-1;j>=0;j--){
      var e=EN[j],dx=bo.x-e.x,dy=bo.y-e.y;
      if(dx*dx+dy*dy<800*e.sl){explode=true;break;}
    }
    // Check direct hit on boss
    if(!explode&&BOSS){
      var dx=bo.x-BOSS.x,dy=bo.y-BOSS.y;
      if(dx*dx+dy*dy<2500*BOSS.sz)explode=true;
    }
    // Time's up or off screen
    if(bo.age>=bo.maxAge||bo.y<-20)explode=true;

    if(explode){
      var bx=bo.x,by=bo.y;
      // BIG explosion visuals + sound
      sfxExplosion(true);
      BM.push({x:bx,y:by,p:0,b:true});
      CRATERS.push({x:bx,y:by,age:0,maxAge:50,bomb:true});
      aP(bx,by,30,255,200,0,6,35);
      aP(bx,by,20,255,100,0,5,40);
      aP(bx,by,12,255,255,200,4,20);
      aP(bx,by,10,100,100,100,3,50);
      shk=14;shkA=12;fls=8;
      aT(bx,by-20,t('boom'),'#FFD700');

      // Damage ALL enemies within big radius
      var R2=BOMB_RADIUS*BOMB_RADIUS;
      for(var j=EN.length-1;j>=0;j--){
        var e=EN[j],dx2=bx-e.x,dy2=by-e.y,d2=dx2*dx2+dy2*dy2;
        if(d2<R2){
          var dist=Math.sqrt(d2);
          var dmg=Math.round(BOMB_DMG*(1-dist/BOMB_RADIUS));
          if(dmg>5){
            e.hp-=dmg;e.ht=6;
            aP(e.x,e.y,6,255,150,0,3,18);
            aT(e.x,e.y-15,'-'+dmg,'#FF6D00');
            if(e.hp<=0)killEnemy(j);
          }
        }
      }
      // Damage boss within radius
      if(BOSS){
        var dx3=bx-BOSS.x,dy3=by-BOSS.y,d3=dx3*dx3+dy3*dy3;
        if(d3<R2){
          var dist2=Math.sqrt(d3);
          var dmg2=Math.round(BOMB_DMG*(1-dist2/BOMB_RADIUS));
          if(dmg2>5){BOSS.hp-=dmg2;BOSS.ht=8;aT(BOSS.x,BOSS.y-30,'-'+dmg2,'#FFD700');}
        }
      }
      BOMBS.splice(i,1);
    }
  }

  // Update craters (water splash rings)
  for(var i=CRATERS.length-1;i>=0;i--){
    CRATERS[i].age++;
    if(CRATERS[i].age>=CRATERS[i].maxAge)CRATERS.splice(i,1);
  }

  // Bullets
  for(var i=0;i<PB.length;i++){PB[i].x+=PB[i].vx;PB[i].y+=PB[i].vy;}
  for(var i=0;i<EB.length;i++){EB[i].x+=EB[i].vx;EB[i].y+=EB[i].vy;}

  // Player bullets -> enemies
  for(var i=PB.length-1;i>=0;i--){
    var b=PB[i];if(b.y<-10){PB.splice(i,1);continue;}
    for(var j=EN.length-1;j>=0;j--){
      var e=EN[j],dx=b.x-e.x,dy=b.y-e.y;
      if(dx*dx+dy*dy<600*e.sl){
        e.hp-=Math.round(10*(b.dm||1));e.ht=3;aP(b.x,b.y,2,255,255,100,1.5,5);
        if(e.hp<=0)killEnemy(j);PB.splice(i,1);break;
      }
    }
  }

  // Enemy bullets -> players
  var pls=[];if(!P.dead)pls.push(P);if(P2&&!P2.dead)pls.push(P2);
  for(var pi=0;pi<pls.length;pi++){
    var pp=pls[pi];
    if(pp.iv<=0){
      for(var i=EB.length-1;i>=0;i--){
        var b=EB[i],dx=b.x-pp.x,dy=b.y-pp.y;
        if(dx*dx+dy*dy<450){
          pp.hp-=Math.round(10*DIFF_M[diff][4]);pp.iv=25;shk=4;shkA=3;fls=3;
          aP(pp.x,pp.y,3,255,0,0,2,8);EB.splice(i,1);
          if(pp.hp<=0)killPlayer(pp);
        }
      }
    }
  }

  // LASER beam collision (continuous beam from player to top)
  var laserPls=[];if(P&&!P.dead&&P.laser)laserPls.push(P);if(P2&&!P2.dead&&P2.laser)laserPls.push(P2);
  for(var lpi=0;lpi<laserPls.length;lpi++){
    var lp=laserPls[lpi];
    LASERS.push({x:lp.x,y:lp.y-25,age:0});
    for(var j=EN.length-1;j>=0;j--){
      var e=EN[j],dx=Math.abs(e.x-lp.x);
      if(dx<15&&e.y<lp.y){
        e.hp-=2;e.ht=2;
        if(Math.random()<0.3)aP(e.x,e.y,1,0,255,255,1,4);
        if(e.hp<=0)killEnemy(j);
      }
    }
    if(BOSS){var bdx=Math.abs(BOSS.x-lp.x);if(bdx<20*BOSS.sz&&BOSS.y<lp.y){BOSS.hp-=1.5;BOSS.ht=2;}}
  }
  for(var i=LASERS.length-1;i>=0;i--){LASERS[i].age++;if(LASERS[i].age>3)LASERS.splice(i,1);}

  // EMP pulse expansion & damage
  for(var i=EMPS.length-1;i>=0;i--){
    var emp=EMPS[i];emp.r+=8;emp.age++;
    if(emp.r>=emp.maxR){EMPS.splice(i,1);continue;}
    for(var j=EN.length-1;j>=0;j--){
      var e=EN[j],dx=e.x-emp.x,dy=e.y-emp.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<emp.r&&d>emp.r-12){
        e.hp-=emp.dmg;e.ht=6;aP(e.x,e.y,4,0,230,255,2,10);
        aT(e.x,e.y-15,'-'+emp.dmg,'#00E5FF');
        if(e.hp<=0)killEnemy(j);
      }
    }
    if(BOSS){var dx2=BOSS.x-emp.x,dy2=BOSS.y-emp.y,d2=Math.sqrt(dx2*dx2+dy2*dy2);
      if(d2<emp.r&&d2>emp.r-15){BOSS.hp-=emp.dmg*0.5;BOSS.ht=6;aT(BOSS.x,BOSS.y-30,'-'+Math.round(emp.dmg*0.5),'#00E5FF');}
    }
  }

  // Collision enemies <-> players
  for(var i=EN.length-1;i>=0;i--){
    var e=EN[i];if(e.y>H+60){EN.splice(i,1);continue;}
    for(var pi=0;pi<pls.length;pi++){
      var pp=pls[pi];if(pp.dead||pp.iv>0)continue;
      var dx=e.x-pp.x,dy=e.y-pp.y;
      if(dx*dx+dy*dy<1000){
        pp.hp-=Math.round(20*DIFF_M[diff][4]);pp.iv=45;e.hp-=40;shk=8;shkA=6;fls=4;
        aP((e.x+pp.x)/2,(e.y+pp.y)/2,8,255,200,0,3,18);
        if(e.hp<=0){killEnemy(i);break;}
        if(pp.hp<=0)killPlayer(pp);
      }
    }
  }

  // Cleanup
  for(var i=EB.length-1;i>=0;i--){var b=EB[i];if(b.x<-15||b.x>W+15||b.y<-15||b.y>H+15)EB.splice(i,1);}
  for(var i=BM.length-1;i>=0;i--){BM[i].p+=0.03;if(BM[i].p>=1)BM.splice(i,1);}

  // Drops (check both players)
  for(var i=DR.length-1;i>=0;i--){
    var p=DR[i];p.y+=p.vy;p.l--;
    if(p.y>H+20||p.l<=0){DR.splice(i,1);continue;}
    var got=false;
    var dpls=[];if(!P.dead)dpls.push(P);if(P2&&!P2.dead)dpls.push(P2);
    for(var pi=0;pi<dpls.length;pi++){
      var pp=dpls[pi];
      var dx=p.x-pp.x,dy=p.y-pp.y;
      if(dx*dx+dy*dy<700){
        if(p.tp==='hp'){pp.hp=Math.min(pp.mh,pp.hp+25);aT(p.x,p.y,'+HP','#4CAF50');}
        else if(p.tp==='m'){pp.am=Math.min(10,pp.am+2);aT(p.x,p.y,'+MISSIL','#FF6D00');}
        else if(p.tp==='b'){pp.bm=Math.min(5,pp.bm+1);aT(p.x,p.y,'+BOMB','#FF1744');}
        got=true;sfxPickup();break;
      }
    }
    if(got)DR.splice(i,1);
  }

  // Clouds & islands scroll
  for(var i=0;i<CL.length;i++)CL[i].y+=CL[i].sp;
  for(var i=CL.length-1;i>=0;i--)if(CL[i].y>H+50)CL.splice(i,1);
  if(Math.random()<0.015)CL.push({x:Math.random()*W,y:-50,s:20+Math.random()*35,sp:0.4+Math.random()*0.3});
  for(var i=0;i<ISLANDS.length;i++)ISLANDS[i].y+=0.8;
  for(var i=ISLANDS.length-1;i>=0;i--)if(ISLANDS[i].y>H+80)ISLANDS.splice(i,1);
  if(Math.random()<0.005)ISLANDS.push({x:30+Math.random()*(W-60),y:-80,w:25+Math.random()*45,h:30+Math.random()*50});

  // Particles & texts
  for(var i=PT.length-1;i>=0;i--){var p=PT[i];p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.l--;if(p.l<=0)PT.splice(i,1);}
  for(var i=TX.length-1;i>=0;i--){TX[i].y-=0.6;TX[i].l--;if(TX[i].l<=0)TX.splice(i,1);}
  if(shk>0)shk--;

  // Boss warning & spawn
  if(spN>=lC.tot&&EN.length===0&&!BOSS&&bossWarn===0&&st==='play'){
    bossWarn=120;sfxBossWarn(); // 2 second warning
  }
  if(bossWarn>0){
    bossWarn--;
    if(bossWarn===0&&!BOSS){BOSS=mkBoss(lv);}
  }

  // UPDATE BOSS
  if(BOSS){
    var bo2=BOSS;bo2.mt+=0.02;if(bo2.ht>0)bo2.ht--;

    // Phase 0: Enter from top
    if(bo2.phase===0){
      bo2.y+=bo2.vy;
      if(bo2.y>=80){bo2.phase=1;bo2.y=80;}
    }
    // Phase 1 & 2: Fight
    else{
      if(bo2.hp<bo2.mh*0.3)bo2.phase=2; // rage mode

      // Movement patterns (switch every ~3 seconds)
      bo2.patT++;
      if(bo2.patT>180){bo2.pat=(bo2.pat+1)%3;bo2.patT=0;}

      if(bo2.pat===0){
        // Sweep left-right
        bo2.vx=Math.sin(bo2.mt*2)*bo2.sp*3;
        bo2.vy=Math.sin(bo2.mt*1.3)*0.5;
      } else if(bo2.pat===1){
        // Track closest player
        var bTgt=P.dead&&P2&&!P2.dead?P2:P;
        var dx=bTgt.x-bo2.x;
        bo2.vx+=Math.sign(dx)*0.12;bo2.vx*=0.96;
        bo2.vy=Math.sin(bo2.mt*2)*0.8;
      } else {
        // Circle pattern
        bo2.vx=Math.cos(bo2.mt*1.5)*bo2.sp*2.5;
        bo2.vy=Math.sin(bo2.mt*1.5)*bo2.sp*1.5;
      }

      bo2.x+=bo2.vx;bo2.y+=bo2.vy;
      bo2.x=Math.max(50,Math.min(W-50,bo2.x));
      bo2.y=Math.max(40,Math.min(H*0.4,bo2.y));

      // Attack 1: Spread shot (fires more bullets at higher levels)
      bo2.cd--;
      if(bo2.cd<=0){
        var nB=3+Math.floor(bo2.lv/2); // 3 to 7 bullets
        if(bo2.phase===2)nB+=2;
        for(var i=0;i<nB;i++){
          var ang=Math.PI/2-(nB-1)*0.12/2+i*0.12;
          if(bo2.phase===2)ang+=Math.sin(bo2.mt*5)*0.1;
          EB.push({x:bo2.x,y:bo2.y+20*bo2.sz,vx:Math.cos(ang)*4.5,vy:Math.sin(ang)*4.5});
        }
        bo2.cd=bo2.phase===2?25:Math.max(20,45-bo2.lv*3);
      }

      // Attack 2: Aimed shots (starts level 2+) - targets closest alive player
      if(bo2.lv>=2){
        bo2.cd2--;
        if(bo2.cd2<=0){
          var tgt=P.dead&&P2&&!P2.dead?P2:P;
          if(P2&&!P2.dead&&!P.dead){
            var d1=Math.abs(P.x-bo2.x)+Math.abs(P.y-bo2.y);
            var d2=Math.abs(P2.x-bo2.x)+Math.abs(P2.y-bo2.y);
            tgt=d2<d1?P2:P;
          }
          var dx=tgt.x-bo2.x,dy=tgt.y-bo2.y,di=Math.sqrt(dx*dx+dy*dy)||1;
          EB.push({x:bo2.x-10,y:bo2.y+15*bo2.sz,vx:(dx/di)*5.5,vy:(dy/di)*5.5});
          EB.push({x:bo2.x+10,y:bo2.y+15*bo2.sz,vx:(dx/di)*5.5,vy:(dy/di)*5.5});
          if(bo2.phase===2){
            for(var j=-1;j<=1;j+=2){
              var a2=Math.atan2(dy,dx)+j*0.2;
              EB.push({x:bo2.x,y:bo2.y+15*bo2.sz,vx:Math.cos(a2)*5,vy:Math.sin(a2)*5});
            }
          }
          bo2.cd2=bo2.phase===2?30:Math.max(25,55-bo2.lv*4);
        }
      }

      // Attack 3: Circle burst (level 4+)
      if(bo2.lv>=4){
        bo2.cd3--;
        if(bo2.cd3<=0){
          var nC=8+bo2.lv;
          for(var i=0;i<nC;i++){
            var a3=(i/nC)*Math.PI*2+bo2.mt;
            EB.push({x:bo2.x,y:bo2.y,vx:Math.cos(a3)*3.5,vy:Math.sin(a3)*3.5});
          }
          bo2.cd3=bo2.phase===2?60:Math.max(50,100-bo2.lv*6);
        }
      }

      // Smoke trail for damaged boss
      if(bo2.hp<bo2.mh*0.5&&Math.random()<0.3)aSm(bo2.x+(Math.random()-0.5)*30,bo2.y-15);
    }

    // Boss hit by player bullets
    for(var i=PB.length-1;i>=0;i--){
      var b=PB[i],dx=b.x-bo2.x,dy=b.y-bo2.y;
      if(dx*dx+dy*dy<1800*bo2.sz){
        bo2.hp-=8;bo2.ht=3;aP(b.x,b.y,2,255,255,100,1.5,5);PB.splice(i,1);
      }
    }
    // Boss hit by missiles
    for(var i=MS.length-1;i>=0;i--){
      var m=MS[i],dx=m.x-bo2.x,dy=m.y-bo2.y;
      if(dx*dx+dy*dy<2000*bo2.sz){
        bo2.hp-=25;bo2.ht=6;aP(m.x,m.y,10,255,150,0,3.5,18);
        BM.push({x:m.x,y:m.y,p:0.2,b:false});
        aT(m.x,m.y-18,t('hit'),'#FF6D00');MS.splice(i,1);
      }
    }
    // (Bomb damage to boss handled in unified bomb explosion logic above)

    // Boss collision with players
    var bpls=[];if(!P.dead)bpls.push(P);if(P2&&!P2.dead)bpls.push(P2);
    for(var pi=0;pi<bpls.length;pi++){
      var pp=bpls[pi];if(pp.iv>0)continue;
      var dx=bo2.x-pp.x,dy=bo2.y-pp.y;
      if(dx*dx+dy*dy<2500*bo2.sz){
        pp.hp-=Math.round(30*DIFF_M[diff][4]);pp.iv=60;shk=10;shkA=8;fls=5;
        aP((bo2.x+pp.x)/2,(bo2.y+pp.y)/2,10,255,200,0,3,18);
        if(pp.hp<=0)killPlayer(pp);
      }
    }

    // Boss death - start 5 second explosion sequence
    if(bo2.hp<=0){
      var pts=500+bo2.lv*300;
      sc+=pts;
      // Initial big explosion
      for(var e=0;e<4;e++){
        BM.push({x:bo2.x+(Math.random()-0.5)*50,y:bo2.y+(Math.random()-0.5)*40,p:e*0.1,b:true});
      }
      aP(bo2.x,bo2.y,30,255,200,0,6,40);
      aP(bo2.x,bo2.y,20,255,80,0,5,35);
      shk=15;shkA=10;fls=8;
      aT(bo2.x,bo2.y-40,t('bossDestroyed')+' +'+pts,'#FFD700');
      sfxExplosion(true);
      // Drop lots of items
      for(var d=0;d<3;d++){
        DR.push({x:bo2.x+(Math.random()-0.5)*60,y:bo2.y+(Math.random()-0.5)*40,tp:['hp','m','b'][d],vy:1,l:400});
      }
      // Save position and start death sequence
      bossDeathX=bo2.x;bossDeathY=bo2.y;
      bossDeath=bossDeathMax; // 300 frames = 5 seconds
      BOSS=null;
    }
  }

  // Boss death explosion sequence (5 seconds of explosions)
  if(bossDeath>0){
    bossDeath--;
    var bd=bossDeathMax-bossDeath; // frames elapsed
    var bdx=bossDeathX,bdy=bossDeathY;

    // Random explosions around boss area - more frequent at start, slower later
    var explInterval=bd<60?4:bd<120?6:bd<180?8:bd<240?12:16;
    if(bd%explInterval===0){
      var rx=bdx+(Math.random()-0.5)*120;
      var ry=bdy+(Math.random()-0.5)*100;
      BM.push({x:rx,y:ry,p:0,b:bd<150});
      aP(rx,ry,8+Math.random()*12,255,Math.floor(100+Math.random()*155),0,4+Math.random()*3,20+Math.random()*20);
      aP(rx,ry,5,100,100,100,3,25);
      // Explosion sound every other time
      if(bd%Math.floor(explInterval*2)===0)sfxExplosion(bd<150);
      // Screen shake - stronger at start
      shk=Math.max(shk,bd<120?8:bd<200?5:3);
      shkA=Math.max(shkA,bd<120?8:bd<200?5:3);
    }
    // Big flash at certain moments
    if(bd===30||bd===90||bd===160){fls=6;sfxExplosion(true);}
    // Smoke particles
    if(bd%3===0){
      aP(bdx+(Math.random()-0.5)*80,bdy+(Math.random()-0.5)*60,4,80,80,80,2,40);
    }

    // Final mega explosion at the end
    if(bossDeath===20){
      sfxExplosion(true);fls=12;shk=20;shkA=16;
      for(var e=0;e<12;e++){
        BM.push({x:bdx+(Math.random()-0.5)*100,y:bdy+(Math.random()-0.5)*80,p:e*0.08,b:true});
      }
      aP(bdx,bdy,50,255,255,200,8,60);
      aP(bdx,bdy,35,255,200,0,7,50);
      aP(bdx,bdy,25,255,100,0,6,55);
      aP(bdx,bdy,20,100,100,100,5,65);
    }

    // Transition to next level when done
    if(bossDeath<=0){
      if(lv>=MLV){sc+=2000;doGameOver();}
      else{sfxLevelUp();startLvl(lv+1);}
    }
  }

  // Level done check (only if no boss phase)
  // (Boss spawns when enemies cleared, level advances when boss dies)
}

// Level background configs
function drawCityBlock(bx,by,bw,bh,wallCol,winCol,winOn){
  cx.fillStyle=wallCol;cx.fillRect(bx,by,bw,bh);
  if(winOn){cx.fillStyle=winCol;for(var wy=by+4;wy<by+bh-3;wy+=6)for(var wx=bx+3;wx<bx+bw-3;wx+=5)cx.fillRect(wx,wy,2,2);}
  // Roof detail
  cx.fillStyle='rgba(0,0,0,0.1)';cx.fillRect(bx,by,bw,2);
}
function drawCityGrid(baseCol,wallCols,winCol,winOn,roadCol,sideCol,parkChance){
  // Sidewalks + roads grid
  var sw=sideCol||'rgba(180,180,180,0.15)';
  cx.fillStyle=roadCol;
  for(var rx=0;rx<W;rx+=55){cx.fillRect(rx,0,6,H);cx.fillStyle=sw;cx.fillRect(rx-1,0,1,H);cx.fillRect(rx+6,0,1,H);cx.fillStyle=roadCol;}
  for(var ry=0;ry<H;ry+=70){var rry=((ry+scrollY*0.5)%H);cx.fillStyle=roadCol;cx.fillRect(0,rry,W,5);cx.fillStyle=sw;cx.fillRect(0,rry-1,W,1);cx.fillRect(0,rry+5,W,1);}
  // Road lane markings (dashed center lines)
  cx.fillStyle='rgba(255,255,255,0.1)';
  for(var rx=0;rx<W;rx+=55)for(var dy=0;dy<H;dy+=10)cx.fillRect(rx+3,((dy+scrollY*0.5)%H),1,4);
  // City blocks
  var pc=parkChance||0;
  for(var gx=0;gx<W;gx+=55){for(var gy=-70;gy<H+70;gy+=70){
    var by2=((gy+scrollY*0.5)%H)-70;
    var seed=(gx*137+gy*89)&0xFFFF;
    // Some blocks are parks
    if(pc>0&&(seed%100)<pc*100){
      // Park block - grass, trees, paths
      cx.fillStyle='rgba(60,130,60,0.25)';cx.fillRect(gx+8,by2+5,42,55);
      cx.fillStyle='rgba(40,110,40,0.4)';
      cx.beginPath();cx.arc(gx+20,by2+25,7,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(gx+38,by2+40,6,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(90,60,30,0.3)';cx.fillRect(gx+19,by2+25,1,8);cx.fillRect(gx+37,by2+40,1,7);
      // Path through park
      cx.fillStyle='rgba(180,170,140,0.2)';cx.fillRect(gx+25,by2+10,3,45);
      // People dots in park
      cx.fillStyle='rgba(255,200,150,0.3)';
      cx.beginPath();cx.arc(gx+22,by2+35,1.5,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(gx+32,by2+20,1.5,0,Math.PI*2);cx.fill();
      continue;
    }
    var nB=2+(seed%3);
    var bx2=gx+8;
    for(var b=0;b<nB;b++){
      var bw=12+(seed>>b&7)*2,bh=20+(seed>>(b+3)&15)*2;
      if(bx2+bw>gx+50)bw=gx+50-bx2;if(bw<6)continue;
      var ci=((seed+b)%wallCols.length);
      drawCityBlock(bx2,by2+70-bh-5,bw,bh,wallCols[ci],winCol,winOn);
      bx2+=bw+3;
    }
  }}
  // Cars on roads
  var carCols=['rgba(200,40,40,0.35)','rgba(40,80,200,0.35)','rgba(255,255,255,0.25)','rgba(50,50,50,0.3)','rgba(255,200,0,0.35)'];
  for(var i=0;i<14;i++){
    var crx=(i*73+17)%W,cry=((i*97+scrollY*0.7)%H);
    cx.fillStyle=carCols[i%carCols.length];
    if(i%2===0)cx.fillRect(crx,cry,4,7);else cx.fillRect(crx,cry,7,4);
  }
  // People on sidewalks
  cx.fillStyle='rgba(200,160,120,0.25)';
  for(var i=0;i<12;i++){
    var px2=(i*61+31)%W,py2=((i*83+scrollY*0.5)%H);
    cx.beginPath();cx.arc(px2,py2,1.2,0,Math.PI*2);cx.fill();
  }
}

  }
  else if(lv===2){

    oc.addColorStop(0,'#8B7355');oc.addColorStop(1,'#7A6545');
    cx.fillStyle=oc;cx.fillRect(0,0,W,H);

    drawCityGrid('#8B7355',['#A08060','#8B7050','#957A5A','#7A6545','#B09070','#6B5A42'],'rgba(255,240,180,0.2)',true,'#5A4A35',null,0.1);
    // Narrow alleys
    cx.fillStyle='rgba(60,45,25,0.15)';

    var ps=55;
    cx.fillStyle='rgba(190,160,70,0.6)';cx.beginPath();cx.moveTo(W*0.25,H*0.3-ps);cx.lineTo(W*0.25-ps,H*0.3+ps*0.5);cx.lineTo(W*0.25+ps,H*0.3+ps*0.5);cx.closePath();cx.fill();
    cx.fillStyle='rgba(170,140,50,0.5)';cx.beginPath();cx.moveTo(W*0.25,H*0.3-ps);cx.lineTo(W*0.25+ps,H*0.3+ps*0.5);cx.lineTo(W*0.25+ps*0.3,H*0.3+ps*0.5);cx.closePath();cx.fill();
    var ps2=40;
    cx.fillStyle='rgba(190,160,70,0.5)';cx.beginPath();cx.moveTo(W*0.48,(H*0.35+scrollY*0.2)%H-ps2);cx.lineTo(W*0.48-ps2,((H*0.35+scrollY*0.2)%H)+ps2*0.5);cx.lineTo(W*0.48+ps2,((H*0.35+scrollY*0.2)%H)+ps2*0.5);cx.closePath();cx.fill();
    // Mosques with domes and minarets on landmarks
    if(ISLANDS)for(var i=0;i<ISLANDS.length;i++){
      var il=ISLANDS[i];
      // Mosque dome
      cx.fillStyle='#A08060';cx.fillRect(il.x-12,il.y-25,24,28);

function drawClouds(){
  if(!CL)return;
  for(var i=0;i<CL.length;i++){
    var c=CL[i];
    cx.fillStyle='rgba(255,255,255,0.25)';
    cx.beginPath();cx.arc(c.x,c.y,c.s*0.5,0,Math.PI*2);
    cx.arc(c.x-c.s*0.3,c.y,c.s*0.35,0,Math.PI*2);
    cx.arc(c.x+c.s*0.3,c.y-c.s*0.1,c.s*0.4,0,Math.PI*2);
    cx.fill();
  }
}

function drawGameScene(){
  // Particles
  if(PT)for(var i=0;i<PT.length;i++){
    var p=PT[i],al=p.l/p.ml;
    if(p.sm){cx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+(al*0.3)+')';cx.beginPath();cx.arc(p.x,p.y,p.sz*(1.5-al*0.5),0,Math.PI*2);cx.fill();}
    else{cx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+al+')';cx.beginPath();cx.arc(p.x,p.y,p.sz*al,0,Math.PI*2);cx.fill();}
  }

  // Drops
  if(DR)for(var i=0;i<DR.length;i++){
    var p=DR[i],pu=1+Math.sin(Date.now()/150)*0.1;
    var cl={hp:'#4CAF50',m:'#FF6D00',b:'#FF1744'}[p.tp];
    var lb={hp:'+',m:'M',b:'B'}[p.tp];
    cx.fillStyle=cl;cx.beginPath();cx.arc(p.x,p.y,10*pu,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.beginPath();cx.arc(p.x,p.y,10*pu,0,Math.PI*2);cx.stroke();
    cx.fillStyle='#fff';cx.font='bold 11px Arial';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(lb,p.x,p.y);
  }

  // Craters (water splash rings on ocean)
  if(CRATERS)for(var i=0;i<CRATERS.length;i++)drawCrater(CRATERS[i]);

  // Falling bombs (shadow + bomb)
  if(BOMBS)for(var i=0;i<BOMBS.length;i++)drawFallingBomb(BOMBS[i]);

  // Laser beams
  if(LASERS)for(var i=0;i<LASERS.length;i++){
    var lb=LASERS[i];
    var lg=cx.createLinearGradient(lb.x,lb.y,lb.x,0);
    lg.addColorStop(0,'rgba(0,255,255,0.7)');lg.addColorStop(0.5,'rgba(0,200,255,0.4)');lg.addColorStop(1,'rgba(0,100,255,0.1)');
    cx.fillStyle=lg;cx.fillRect(lb.x-3,0,6,lb.y);
    // Core bright line
    cx.fillStyle='rgba(255,255,255,0.6)';cx.fillRect(lb.x-1,0,2,lb.y);
    // Glow
    cx.fillStyle='rgba(0,255,255,0.08)';cx.fillRect(lb.x-10,0,20,lb.y);
  }

  // EMP pulses
  if(EMPS)for(var i=0;i<EMPS.length;i++){
    var emp=EMPS[i],ea=1-emp.r/emp.maxR;
    cx.strokeStyle='rgba(0,229,255,'+ea*0.7+')';cx.lineWidth=4;
    cx.beginPath();cx.arc(emp.x,emp.y,emp.r,0,Math.PI*2);cx.stroke();
    cx.strokeStyle='rgba(150,240,255,'+ea*0.3+')';cx.lineWidth=8;
    cx.beginPath();cx.arc(emp.x,emp.y,emp.r*0.9,0,Math.PI*2);cx.stroke();
    // Inner flash
    cx.fillStyle='rgba(0,229,255,'+ea*0.05+')';cx.beginPath();cx.arc(emp.x,emp.y,emp.r,0,Math.PI*2);cx.fill();
  }

  // Enemy bullets
  if(EB)for(var i=0;i<EB.length;i++)drawBullet(EB[i].x,EB[i].y,true);
  // Player bullets
  if(PB)for(var i=0;i<PB.length;i++)drawBullet(PB[i].x,PB[i].y,false);
  // Missiles
  if(MS)for(var i=0;i<MS.length;i++)drawMissile(MS[i].x,MS[i].y,MS[i].a);

  // Enemies
  if(EN)for(var i=0;i<EN.length;i++){
    var e=EN[i];
    drawEnemyPlane(e.x,e.y,e.t,e.sl,e.ht,e.hp<e.mh*0.4);
    drawHP(e.x,e.y-25*e.sl,e.hp,e.mh,30);
  }

  // Boss
  if(BOSS)drawBossPlane(BOSS);

  // Boss warning
  if(bossWarn>0){
    cx.save();
    cx.fillStyle='rgba(255,0,0,'+(0.15+Math.sin(bossWarn*0.3)*0.1)+')';
    cx.fillRect(0,0,W,H);
    cx.fillStyle='#FF1744';cx.font='bold 28px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.globalAlpha=0.5+Math.sin(bossWarn*0.2)*0.5;
    cx.fillText(t('warning'),W/2,H/2-20);
    cx.font='bold 16px Arial';cx.fillStyle='#FFD700';
    cx.fillText(t('bossApproach'),W/2,H/2+15);
    cx.restore();
  }

  // Player 1
  if(P&&!P.dead&&(P.iv<=0||Math.floor(P.iv/3)%2===0)){
    if(P.boosting){cx.fillStyle='rgba(255,200,0,0.15)';cx.beginPath();cx.arc(P.x,P.y,30+Math.random()*8,0,Math.PI*2);cx.fill();}
    drawPlayerPlane(P.x,P.y,P.roll);
  }
  // Player 2
  if(P2&&!P2.dead&&(P2.iv<=0||Math.floor(P2.iv/3)%2===0)){
    if(P2.boosting){cx.fillStyle='rgba(100,200,255,0.15)';cx.beginPath();cx.arc(P2.x,P2.y,30+Math.random()*8,0,Math.PI*2);cx.fill();}
    drawPlayer2Plane(P2.x,P2.y,P2.roll);
  }

  // Booms
  if(BM)for(var i=0;i<BM.length;i++)drawBoom(BM[i].x,BM[i].y,BM[i].p,BM[i].b);

  // Texts
  if(TX)for(var i=0;i<TX.length;i++){
    var ti=TX[i];cx.save();cx.globalAlpha=ti.l/ti.ml;
    cx.fillStyle=ti.c;cx.font='bold 14px Arial';cx.textAlign='center';
    cx.fillText(ti.t,ti.x,ti.y);cx.restore();
  }

  if(fls>0){cx.fillStyle='rgba(255,0,0,'+(fls*0.03)+')';cx.fillRect(0,0,W,H);}

  // HUD - 1942 style
  var hudH=P2?78:66;
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(4,4,W-8,hudH);

  cx.font='bold 11px Arial';cx.textAlign='left';cx.textBaseline='top';

  // P1 HP
  cx.fillStyle='#4CAF50';cx.fillText('P1',10,10);
  if(P){
    var hr=P.dead?0:P.hp/P.mh;
    cx.fillStyle='#222';cx.fillRect(30,9,80,8);
    cx.fillStyle=P.dead?'#555':hr>0.5?'#4CAF50':hr>0.25?'#FF9800':'#F44336';
    cx.fillRect(30,9,80*hr,8);
    if(P.dead){cx.fillStyle='#F44336';cx.fillText(t('dead'),32,9);}
    // Laser energy bar (only if plane has laser)
    var p1hAtk=PLANES[P.pt].atk;
    var p1hx=115;
    if(p1hAtk.laser){
      cx.fillStyle='#00BCD4';cx.font='8px Arial';cx.fillText('L',p1hx,10);
      cx.fillStyle='#111';cx.fillRect(p1hx+7,10,30,5);
      cx.fillStyle='#00E5FF';cx.fillRect(p1hx+7,10,30*(P.laserE/P.laserMax),5);
      p1hx+=42;
    }
    if(p1hAtk.boost){
      cx.fillStyle='#FFD600';cx.font='8px Arial';cx.fillText('S',p1hx,10);
      cx.fillStyle='#111';cx.fillRect(p1hx+7,10,30,5);
      cx.fillStyle=P.boosting?'#FF6D00':'#FFFF00';cx.fillRect(p1hx+7,10,30*(P.boostE/P.boostMax),5);
    }
  }
  // P1 bombs + EMP + spread cooldown (only show available)
  cx.font='9px Arial';var p1cx=10;
  if(P&&PLANES[P.pt].atk.bomb){
    cx.fillStyle='#FF1744';var p1b='';for(var i=0;i<(!P.dead?P.bm:0);i++)p1b+='*';
    cx.fillText('B:'+p1b,p1cx,20);p1cx+=38;
  }
  if(P&&PLANES[P.pt].atk.emp){
    if(P.emp>0){cx.fillStyle='#00E5FF';cx.fillText('EMP:'+Math.ceil(P.emp/60)+'s',p1cx,20);}else{cx.fillStyle='#00E5FF';cx.fillText('EMP:OK',p1cx,20);}
    p1cx+=48;
  }
  if(P&&PLANES[P.pt].atk.spread){
    if(P.sprd>0){cx.fillStyle='#FFA726';cx.fillText('SPR:'+P.sprd,p1cx,20);}else{cx.fillStyle='#FFA726';cx.fillText('SPR:OK',p1cx,20);}
  }

  // P2 HP (if 2 player mode)
  if(P2){
    cx.fillStyle='#2196F3';cx.font='bold 11px Arial';cx.fillText('P2',10,32);
    var hr2=P2.dead?0:P2.hp/P2.mh;
    cx.fillStyle='#222';cx.fillRect(30,31,80,8);
    cx.fillStyle=P2.dead?'#555':hr2>0.5?'#42A5F5':hr2>0.25?'#FF9800':'#F44336';
    cx.fillRect(30,31,80*hr2,8);
    if(P2.dead){cx.fillStyle='#F44336';cx.fillText(t('dead'),32,31);}
    var p2hAtk=PLANES[P2.pt].atk;
    var p2hx=115;
    if(p2hAtk.laser){
      cx.fillStyle='#00BCD4';cx.font='8px Arial';cx.fillText('L',p2hx,32);
      cx.fillStyle='#111';cx.fillRect(p2hx+7,32,30,5);
      cx.fillStyle='#00E5FF';cx.fillRect(p2hx+7,32,30*(P2.laserE/P2.laserMax),5);
      p2hx+=42;
    }
    if(p2hAtk.boost){
      cx.fillStyle='#FFD600';cx.font='8px Arial';cx.fillText('S',p2hx,32);
      cx.fillStyle='#111';cx.fillRect(p2hx+7,32,30,5);
      cx.fillStyle=P2.boosting?'#FF6D00':'#FFFF00';cx.fillRect(p2hx+7,32,30*(P2.boostE/P2.boostMax),5);
    }
    cx.font='9px Arial';var p2cx=10;
    if(p2hAtk.bomb){
      cx.fillStyle='#FF1744';var p2b='';for(var i=0;i<(!P2.dead?P2.bm:0);i++)p2b+='*';
      cx.fillText('B:'+p2b,p2cx,42);p2cx+=38;
    }
    if(p2hAtk.emp){
      if(P2.emp>0){cx.fillStyle='#00E5FF';cx.fillText('EMP:'+Math.ceil(P2.emp/60)+'s',p2cx,42);}else{cx.fillStyle='#00E5FF';cx.fillText('EMP:OK',p2cx,42);}
      p2cx+=48;
    }
    if(p2hAtk.spread){
      if(P2.sprd>0){cx.fillStyle='#FFA726';cx.fillText('SPR:'+P2.sprd,p2cx,42);}else{cx.fillStyle='#FFA726';cx.fillText('SPR:OK',p2cx,42);}
    }
  }

  // Score
  var sy=P2?52:32;
  cx.fillStyle='#FFD700';cx.font='bold 12px Arial';
  cx.fillText(t('score')+Math.round(sc),10,sy);

  // Level & combo
  cx.fillStyle='#FFD700';cx.font='bold 12px Arial';cx.textAlign='right';
  cx.fillText(t('stage')+lv,W-10,18);
  if(lC){
    if(BOSS){
      cx.fillStyle='#FF1744';cx.font='bold 10px Arial';cx.fillText(t('bossFight'),W-10,32);
    } else {
      var rm=Math.max(0,lC.tot-spN+EN.length);
      cx.fillStyle='#fff';cx.font='10px Arial';cx.fillText(t('enemies')+rm,W-10,32);
    }
  }
  if(cmb>=2){cx.fillStyle='#FFD700';cx.font='bold 13px Arial';cx.textAlign='center';cx.fillText('x'+cmb+' '+t('combo'),W/2,P2?50:18);}
}

function draw(){
  cx.save();
  if(shk>0)cx.translate((Math.random()-0.5)*shkA*2,(Math.random()-0.5)*shkA*2);

  drawOcean();

  // ====== PVP ACTIVE? Skip normal states ======
  var pvpActive=pvpState==='lobby'||pvpState==='planesel'||pvpState==='countdown'||pvpState==='fight'||pvpState==='result'||pvpState==='connecting';

  // ====== MENU ======
  if(st==='menu'&&!pvpActive){
    drawClouds();
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#FFD700';cx.font='bold 42px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('1942',W/2,H/2-155);
    cx.fillStyle='#fff';cx.font='bold 22px Arial';
    cx.fillText('SKY FIGHTER',W/2,H/2-118);

    cx.textAlign='center';
    cx.fillStyle='#4CAF50';cx.font='bold 12px Arial';
    cx.fillText(t('p1Header'),W/2,H/2-95);
    cx.fillStyle='#ddd';cx.font='11px Arial';
    cx.fillText(t('p1c1'),W/2,H/2-80);
    cx.fillText(t('p1c2'),W/2,H/2-66);
    cx.fillText(t('p1c3'),W/2,H/2-52);

    cx.fillStyle='#2196F3';cx.font='bold 12px Arial';
    cx.fillText(t('p2Header'),W/2,H/2-34);
    cx.fillStyle='#ddd';cx.font='11px Arial';
    cx.fillText(t('p2c1'),W/2,H/2-20);
    cx.fillText(t('p2c2'),W/2,H/2-6);
    cx.fillText(t('p2c3'),W/2,H/2+8);

    cx.fillStyle='#aaa';cx.font='11px Arial';
    cx.fillText(t('pause'),W/2,H/2+26);

    cx.fillStyle='#FF6D00';cx.font='bold 12px Arial';
    cx.fillText(t('diffPlanes'),W/2,H/2+44);

    // Difficulty selector
    cx.fillStyle='#aaa';cx.font='bold 11px Arial';
    cx.fillText(t('diffLabel'),W/2,H/2+63);
    var dbw=56,dby=H/2+76;
    for(var di=0;di<3;di++){
      var dbx=W/2-65+di*65;
      var sel=di===diff;
      cx.fillStyle=sel?DIFF_COLS[di]:'rgba(60,60,60,0.7)';
      cx.fillRect(dbx-dbw/2,dby,dbw,22);
      if(sel){cx.strokeStyle='#fff';cx.lineWidth=2;cx.strokeRect(dbx-dbw/2,dby,dbw,22);}
      cx.fillStyle=sel?'#fff':'#aaa';cx.font=sel?'bold 11px Arial':'11px Arial';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(DIFF_NAMES[di],dbx,dby+11);
      if(mC&&mX>=dbx-dbw/2&&mX<=dbx+dbw/2&&mY>=dby&&mY<=dby+22){diff=di;}
    }

    if(drawBtn(W/2,H/2+115,200,40,t('play1'))){nPl=1;st='planesel';}
    if(drawBtn(W/2,H/2+155,200,40,t('play2'))){nPl=2;st='planesel';}
    if(drawBtn(W/2,H/2+195,200,40,t('pvp'))){st='pvpmenu';}

    // Language selector (below buttons)
    var lgY=H/2+232;
    cx.fillStyle='#aaa';cx.font='bold 10px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(t('langLabel'),W/2,lgY);
    var lgBw=52,lgTotalW=lgBw*3+8;
    for(var li=0;li<3;li++){
      var lbx=W/2-lgTotalW/2+li*(lgBw+4);
      var lsel=li===lang;
      cx.fillStyle=lsel?'rgba(255,215,0,0.5)':'rgba(60,60,60,0.5)';
      cx.fillRect(lbx,lgY+8,lgBw,20);
      if(lsel){cx.strokeStyle='#FFD700';cx.lineWidth=1.5;cx.strokeRect(lbx,lgY+8,lgBw,20);}
      cx.fillStyle=lsel?'#fff':'#999';cx.font=lsel?'bold 10px Arial':'10px Arial';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(LANG_NAMES[li],lbx+lgBw/2,lgY+18);
      if(mC&&mX>=lbx&&mX<=lbx+lgBw&&mY>=lgY+8&&mY<=lgY+28){lang=li;updateLangStrings();}
    }

    mC=false;cx.restore();return;
  }

  // ====== PVP MENU ======
  if(st==='pvpmenu'&&!pvpActive){
    drawClouds();
    cx.fillStyle='rgba(0,0,0,0.75)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#FF6D00';cx.font='bold 32px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(t('pvp'),W/2,H/2-120);

    if(pvpError){
      cx.fillStyle='#F44336';cx.font='bold 13px Arial';
      cx.fillText(t('pvpError')+pvpError,W/2,H/2-80);
    }

    if(drawBtn(W/2,H/2-30,220,44,t('pvpCreate'))){pvpMyPlane=plSel;pvpCreateRoom();}
    if(drawBtn(W/2,H/2+30,220,44,t('pvpJoin'))){st='pvpjoin';pvpInputCode='';}
    if(drawBtn(W/2,H/2+100,160,34,t('back'))){st='menu';pvpError='';}

    mC=false;cx.restore();return;
  }

  // ====== PVP JOIN (enter code) ======
  if(st==='pvpjoin'&&!pvpActive){
    drawClouds();
    cx.fillStyle='rgba(0,0,0,0.75)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#FFD700';cx.font='bold 22px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(t('pvpEnterCode'),W/2,H/2-80);

    // Show input code
    cx.fillStyle='rgba(255,255,255,0.1)';cx.fillRect(W/2-80,H/2-50,160,50);
    cx.strokeStyle='#FFD700';cx.lineWidth=2;cx.strokeRect(W/2-80,H/2-50,160,50);
    cx.fillStyle='#fff';cx.font='bold 32px monospace';
    cx.fillText(pvpInputCode+'_',W/2,H/2-25);

    cx.fillStyle='#aaa';cx.font='12px Arial';
    cx.fillText(lang===0?'Skriv 4 bokstäver':lang===2?'输入4个字符':'Type 4 characters',W/2,H/2+15);

    if(pvpInputCode.length>=4){
      if(drawBtn(W/2,H/2+55,180,40,t('pvpJoin'))){pvpMyPlane=plSel;pvpJoinRoom(pvpInputCode);}
    }
    if(drawBtn(W/2,H/2+110,160,34,t('back'))){st='pvpmenu';pvpInputCode='';}

    mC=false;cx.restore();return;
  }

  // ====== PVP LOBBY (waiting for opponent) ======
  if(pvpState==='connecting'){
    drawClouds();
    cx.fillStyle='rgba(0,0,0,0.75)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#FFD700';cx.font='bold 18px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(t('pvpConnecting'),W/2,H/2);
    mC=false;cx.restore();return;
  }

  if(pvpState==='lobby'){
    drawClouds();
    cx.fillStyle='rgba(0,0,0,0.75)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#FFD700';cx.font='bold 22px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(t('pvpCode'),W/2,H/2-80);

    // Big room code
    cx.fillStyle='#fff';cx.font='bold 48px monospace';
    cx.fillText(pvpRoom,W/2,H/2-30);

    cx.fillStyle='#aaa';cx.font='14px Arial';
    cx.fillText(t('pvpWaiting'),W/2,H/2+20);

    // Animated dots
    var dots='.'.repeat(1+Math.floor(Date.now()/500)%3);
    cx.fillText(dots,W/2,H/2+42);

    if(drawBtn(W/2,H/2+90,160,34,t('pvpLeave'))){pvpDisconnect();st='pvpmenu';}

    mC=false;cx.restore();return;
  }

  // ====== PVP PLANE SELECT ======
  if(pvpState==='planesel'){
    drawClouds();
    cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,H);

    cx.fillStyle='#FFD700';cx.font='bold 22px Arial';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(t('pvpSelectPlane'),W/2,25);

    cx.fillStyle='#aaa';cx.font='12px Arial';
    cx.fillText(t('pvpCode')+' '+pvpRoom,W/2,50);

    // Show opponent's plane choice
    cx.fillStyle='#F44336';cx.font='bold 11px Arial';
    cx.fillText(t('pvpVs')+' '+PLANES[pvpOpponentPlane].name,W/2,68);

    // Draw plane cards (same as normal selection but for PvP)
    var cardW=Math.floor((W-30)/2),cardH=140;
    var startY=85;
    for(var pi=0;pi<4;pi++){
      var col2=Math.floor(pi%2),row2=Math.floor(pi/2);
      var cx0=10+col2*(cardW+10)+cardW/2;
      var cy0=startY+row2*(cardH+8)+cardH/2;
      var cLeft=cx0-cardW/2,cTop=cy0-cardH/2;
      var selected=pi===pvpMyPlane;

      cx.fillStyle=selected?'rgba(255,150,0,0.4)':'rgba(40,40,40,0.6)';
      cx.fillRect(cLeft,cTop,cardW,cardH);
      cx.strokeStyle=selected?'#FF6D00':'rgba(255,255,255,0.15)';
      cx.lineWidth=selected?3:1;
      cx.strokeRect(cLeft,cTop,cardW,cardH);
      if(selected){cx.fillStyle='#FF6D00';cx.font='bold 9px Arial';cx.textAlign='center';cx.fillText('★ YOU',cx0,cTop+10);}

      drawPlaneGeneric(cx0,cTop+(selected?34:24),0,pi,'#FF6D00');
      cx.fillStyle=PLANES[pi].col[1];cx.font='bold 12px Arial';cx.textAlign='center';
      cx.fillText(PLANES[pi].name,cx0,cTop+(selected?60:50));

      // Stats
      var barY2=cTop+(selected?70:58),barW2=cardW-24,barH2=5,barX2=cLeft+12;
      var stats2=[{label:'HP',val:PLANES[pi].hp/150,col:'#4CAF50'},{label:'SPD',val:PLANES[pi].spd/1.3,col:'#2196F3'},{label:'ROF',val:PLANES[pi].firerate/1.5,col:'#FF9800'},{label:'DMG',val:PLANES[pi].dmg/1.5,col:'#F44336'}];
      for(var si=0;si<stats2.length;si++){
        var sy2=barY2+si*(barH2+3);
        cx.fillStyle='#aaa';cx.font='bold 6px Arial';cx.textAlign='left';cx.fillText(stats2[si].label,barX2,sy2+barH2-1);
        cx.fillStyle='rgba(255,255,255,0.1)';cx.fillRect(barX2+20,sy2,barW2-20,barH2);
        cx.fillStyle=stats2[si].col;cx.fillRect(barX2+20,sy2,Math.min(stats2[si].val,1)*(barW2-20),barH2);
      }

      // Attacks
      var atkY2=barY2+stats2.length*(barH2+3)+3;
      var atkList2=[{key:'missile',label:'MIS',col:'#FF6D00'},{key:'bomb',label:'BMB',col:'#FF1744'},{key:'laser',label:'LAS',col:'#00E5FF'},{key:'spread',label:'SPR',col:'#FFA726'},{key:'emp',label:'EMP',col:'#7C4DFF'},{key:'boost',label:'BST',col:'#FFFF00'}];
      var ac2=0;for(var ai=0;ai<atkList2.length;ai++)if(PLANES[pi].atk[atkList2[ai].key])ac2++;
      var as2=Math.min(24,Math.floor((cardW-14)/ac2)),ax2=cx0-((ac2-1)*as2)/2,ai2=0;
      for(var ai=0;ai<atkList2.length;ai++){
        if(!PLANES[pi].atk[atkList2[ai].key])continue;
        cx.fillStyle=atkList2[ai].col;cx.font='bold 7px Arial';cx.textAlign='center';
        cx.fillText(atkList2[ai].label,ax2+ai2*as2,atkY2);ai2++;
      }

      if(mC&&mX>=cLeft&&mX<=cLeft+cardW&&mY>=cTop&&mY<=cTop+cardH){
        pvpMyPlane=pi;pvpSend({type:'plane_select',planeType:pi});
      }
    }

    // Ready button
    var readyY=H-55;
    if(!pvpMyReady){
      if(drawBtn(W/2,readyY,200,40,t('pvpReady'))){
        pvpMyReady=true;pvpSend({type:'ready'});
        // If both ready and we're host, start!
        if(pvpMyReady&&pvpOpponentReady&&pvpIsHost){pvpSend({type:'start'});pvpStartFight();}
      }
    } else {
      cx.fillStyle='#4CAF50';cx.font='bold 16px Arial';cx.textAlign='center';
      cx.fillText('✓ '+t('pvpReady'),W/2,readyY);
    }
    if(pvpOpponentReady){cx.fillStyle='#4CAF50';cx.font='11px Arial';cx.fillText(t('pvpConnected')+' ✓',W/2,readyY+22);}
    else{cx.fillStyle='#aaa';cx.font='11px Arial';cx.fillText(t('pvpWaiting'),W/2,readyY+22);}

    if(drawBtn(W/2,H-18,120,28,t('pvpLeave'))){pvpDisconnect();st='pvpmenu';}

    mC=false;cx.restore();return;
  }

  // ====== PVP COUNTDOWN ======
  if(pvpState==='countdown'){
    drawOcean();drawClouds();

    // Attack cooldown indicators
    if(P&&!P.dead){

    // Special attack buttons - arrange vertically above fire
    var specBtns=[];
    if(p1atk.missile)specBtns.push({key:'missile',label:'MIS',col:'#FF6D00'});
    if(p1atk.bomb)specBtns.push({key:'bomb',label:'BMB',col:'#FF1744'});
    if(p1atk.laser)specBtns.push({key:'laser',label:'LAS',col:'#00E5FF'});
    if(p1atk.spread)specBtns.push({key:'spread',label:'SPR',col:'#FFA726'});
    if(p1atk.emp)specBtns.push({key:'emp',label:'EMP',col:'#7C4DFF'});
    if(p1atk.boost)specBtns.push({key:'boost',label:'BST',col:'#FFFF00'});

    for(var sb=0;sb<specBtns.length;sb++){
      var sby=btnY-fbr-12-(sb*(btnR*2+6));
      var sbx=btnX-(sb%2===0?0:btnR*2+6);
      // Arrange in 2 columns if many
      if(specBtns.length>3){
        sbx=btnX-(sb%2)*(btnR*2+6);
        sby=btnY-fbr-12-Math.floor(sb/2)*(btnR*2+6);
      }
      tBtnDefs.push({key:specBtns[sb].key,x:sbx,y:sby,r:btnR});
      cx.globalAlpha=tBtns[specBtns[sb].key]?0.7:0.3;
      cx.fillStyle=specBtns[sb].col;cx.beginPath();cx.arc(sbx,sby,btnR,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;cx.fillStyle='#fff';cx.font='bold 9px Arial';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(specBtns[sb].label,sbx,sby);
    }

    // Pause button (top right)
    tBtnDefs.push({key:'pause',x:W-25,y:25,r:18});
    cx.globalAlpha=0.3;cx.fillStyle='#fff';cx.beginPath();cx.arc(W-25,25,18,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;cx.fillStyle='#fff';cx.font='bold 10px Arial';cx.fillText('II',W-25,25);
  }

  // Touch pause handling
  if(isMobile&&tBtns.pause&&(st==='play'||st==='pause')){
    st=st==='play'?'pause':'play';
    if(st==='pause'){stopEngine();stopBGM();}else{startEngine();startBGM(lv);}
    delete tBtns.pause;
  }

  mC=false;cx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
